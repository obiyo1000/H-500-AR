<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>H-500 Analyzer - Android ARCore</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Sarabun', sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 100;
            font-size: 14px;
            text-align: center;
            backdrop-filter: blur(10px);
            pointer-events: none;
            white-space: nowrap;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 100;
            padding: 10px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0,230,118,0.95);
            color: black;
            backdrop-filter: blur(10px);
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
        @media (max-width: 768px) {
            #info { font-size: 11px; white-space: normal; max-width: 90%; }
            button { padding: 10px 18px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="info">
        🤖 Android ARCore Mode | กำลังตรวจจับพื้น... ขยับกล้องช้าๆ
    </div>
    <div id="controls">
        <button id="ar-btn">📍 เริ่ม AR</button>
        <button id="reset-btn">🔄 รีเซ็ต</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ตั้งค่า Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x898989);
        
        // ตั้งค่า Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 3);
        
        // ตั้งค่า Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // ควบคุมการมองเห็น (non-AR mode)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = true;
        
        // แสง
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(1, 2, 1);
        scene.add(directionalLight);
        
        const backLight = new THREE.DirectionalLight(0xffffff, 0.5);
        backLight.position.set(-1, 1, -1);
        scene.add(backLight);
        
        // Helper grid (สำหรับ non-AR)
        const gridHelper = new THREE.GridHelper(10, 20, 0x888888, 0x444444);
        scene.add(gridHelper);
        
        let currentModel = null;
        let isARMode = false;
        
        // โหลดโมเดล GLB
        const loader = new THREE.GLTFLoader();
        const modelUrl = window.location.origin + '/model.glb';
        
        function loadModel() {
            loader.load(modelUrl, 
                (gltf) => {
                    currentModel = gltf.scene;
                    currentModel.scale.set(1.5, 1.5, 1.5);
                    currentModel.position.set(0, 0, 0);
                    scene.add(currentModel);
                    
                    document.getElementById('info').innerHTML = '✅ โหลดโมเดลสำเร็จ | แตะที่พื้นเพื่อวางวัตถุ';
                    setTimeout(() => {
                        if (document.getElementById('info').innerHTML.includes('สำเร็จ')) {
                            document.getElementById('info').innerHTML = '🤖 Android ARCore | ขยับกล้องเพื่อหาพื้น';
                        }
                    }, 3000);
                },
                (xhr) => {
                    const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                    document.getElementById('info').innerHTML = `📥 กำลังโหลดโมเดล... ${percent}%`;
                },
                (error) => {
                    console.error('Error loading model:', error);
                    document.getElementById('info').innerHTML = '❌ โหลดโมเดลไม่สำเร็จ ตรวจสอบไฟล์ model.glb';
                }
            );
        }
        
        // เริ่ม AR
        function startAR() {
            if ('xr' in navigator) {
                document.body.appendChild(ARButton.createButton(renderer, {
                    requiredFeatures: ['hit-test'],
                    optionalFeatures: ['dom-overlay'],
                    domOverlay: { root: document.body }
                }));
                
                renderer.xr.addEventListener('sessionstart', () => {
                    isARMode = true;
                    controls.enabled = false;
                    gridHelper.visible = false;
                    document.getElementById('info').innerHTML = '🎯 โหมด AR เริ่มทำงาน | แตะที่พื้นเพื่อวางวัตถุ';
                    
                    // ตั้งค่า hit test
                    const controller = renderer.xr.getController(0);
                    controller.addEventListener('select', onSelect);
                    scene.add(controller);
                });
                
                renderer.xr.addEventListener('sessionend', () => {
                    isARMode = false;
                    controls.enabled = true;
                    gridHelper.visible = true;
                    document.getElementById('info').innerHTML = '🔄 ออกจากโหมด AR | ใช้ระบบ 3D ปกติ';
                });
            } else {
                document.getElementById('info').innerHTML = '⚠️ เบราว์เซอร์นี้ไม่รองรับ WebXR';
            }
        }
        
        let hitTestSource = null;
        
        function onSelect() {
            if (!isARMode) return;
            
            const session = renderer.xr.getSession();
            const frame = renderer.xr.getFrame();
            const referenceSpace = renderer.xr.getReferenceSpace();
            
            const xrCamera = frame.getViewerPose(referenceSpace);
            if (xrCamera) {
                const hitTestResults = frame.getHitTestResults(hitTestSource);
                if (hitTestResults.length > 0) {
                    const hit = hitTestResults[0];
                    const pose = hit.getPose(referenceSpace);
                    
                    if (currentModel) {
                        // ย้ายโมเดลไปยังตำแหน่งใหม่
                        currentModel.position.set(pose.transform.position.x, 
                                                  pose.transform.position.y, 
                                                  pose.transform.position.z);
                        document.getElementById('info').innerHTML = '✅ วางวัตถุเรียบร้อย | แตะค้างเพื่อเคลื่อนย้าย';
                        setTimeout(() => {
                            document.getElementById('info').innerHTML = '🎯 แตะที่พื้นเพื่อย้ายวัตถุ';
                        }, 2000);
                    }
                }
            }
        }
        
        // Animation Loop
        function animate() {
            renderer.render(scene, camera);
            if (!isARMode && controls) {
                controls.update();
            }
        }
        
        renderer.setAnimationLoop(animate);
        
        // Event Listeners
        document.getElementById('ar-btn').onclick = startAR;
        document.getElementById('reset-btn').onclick = () => {
            if (currentModel) {
                currentModel.position.set(0, 0, 0);
                camera.position.set(0, 1.5, 3);
                controls.target.set(0, 0, 0);
                document.getElementById('info').innerHTML = '🔄 รีเซ็ตตำแหน่งเรียบร้อย';
                setTimeout(() => {
                    document.getElementById('info').innerHTML = '🤖 Android ARCore | พร้อมใช้งาน';
                }, 2000);
            }
        };
        
        // เริ่มโหลดโมเดล
        loadModel();
    </script>
</body>
</html>
