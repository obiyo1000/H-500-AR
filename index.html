<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-500 AR - ระบบตรวจจับอัตโนมัติ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, 'Sarabun', sans-serif;
        }
        
        .loader {
            text-align: center;
            color: white;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 50px;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .manual-buttons {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-android {
            background: #3DDC84;
            color: black;
        }
        
        .btn-ios {
            background: #000000;
            color: white;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        @media (max-width: 768px) {
            .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h2>กำลังตรวจสอบอุปกรณ์ของคุณ...</h2>
        <div class="message" id="message">
            กำลังโหลดระบบ AR
        </div>
        <p style="margin-top: 20px; font-size: 12px; opacity: 0.7;">
            H-500 Urine Analyzer AR Experience
        </p>
    </div>
    
    <div class="manual-buttons">
        <button class="btn btn-android" onclick="forceAndroid()">
            🤖 เปิดเวอร์ชัน Android
        </button>
        <button class="btn btn-ios" onclick="forceIOS()">
            🍎 เปิดเวอร์ชัน iOS
        </button>
    </div>

    <script>
        function getDeviceType() {
            const ua = navigator.userAgent;
            const isIOS = /iPad|iPhone|iPod/.test(ua) || 
                         (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            const isAndroid = /Android/.test(ua);
            return { isIOS, isAndroid };
        }
        
        const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/');
        
        function redirectToCorrectVersion() {
            const { isIOS, isAndroid } = getDeviceType();
            const messageDiv = document.getElementById('message');
            
            if (isIOS) {
                messageDiv.innerHTML = '📱 ตรวจพบ iPhone/iPad กำลังโหลดเวอร์ชัน iOS...';
                setTimeout(() => {
                    window.location.href = baseUrl + 'ios/index.html';
                }, 1500);
            } 
            else if (isAndroid) {
                messageDiv.innerHTML = '🤖 ตรวจพบ Android กำลังโหลดเวอร์ชัน Android...';
                setTimeout(() => {
                    window.location.href = baseUrl + 'android/index.html';
                }, 1500);
            }
            else {
                messageDiv.innerHTML = '💻 ตรวจพบคอมพิวเตอร์ กำลังโหลดเวอร์ชัน 3D...';
                setTimeout(() => {
                    window.location.href = baseUrl + 'android/index.html';
                }, 1500);
            }
        }
        
        function forceAndroid() {
            window.location.href = baseUrl + 'android/index.html';
        }
        
        function forceIOS() {
            window.location.href = baseUrl + 'ios/index.html';
        }
        
        redirectToCorrectVersion();
    </script>
</body>
</html>
